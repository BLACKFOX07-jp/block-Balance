<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Compact Puzzle</title>
    <style>
        :root { 
            --bg: #05070a; --grid: #1e293b; --accent: #22d3ee;
            --cell: min(8.5vh, 50px, 11vw); --gap: 3px; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; height: 100vh; height: 100dvh; overflow: hidden; 
            touch-action: none; user-select: none; justify-content: space-between;
            padding: 10px 0;
        }
        #score { font-size: min(50px, 8vh); font-weight: 900; color: var(--accent); margin: 0; flex-shrink: 0; }
        #game-board {
            display: grid; grid-template: repeat(8, var(--cell)) / repeat(8, var(--cell));
            gap: var(--gap); background: #334155; padding: var(--gap); border-radius: 8px; flex-shrink: 0;
        }
        .cell { width: var(--cell); height: var(--cell); background: var(--grid); border-radius: 4px; }
        .cell.preview { background: rgba(255,255,255,.3) !important; box-shadow: inset 0 0 8px #fff; }
        .cell.filled { border: 1px solid rgba(255,255,255,.1); }
        #hand {
            display: flex; justify-content: space-around; width: 95%; max-width: 400px;
            height: clamp(100px, 16vh, 130px); background: rgba(255,255,255,.03);
            border-radius: 16px; align-items: center; flex-shrink: 0;
        }
        .slot { width: 32%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .piece { display: grid; gap: 2px; position: absolute; }
        .p-cell { width: 20px; height: 20px; border-radius: 3px; }
        .dragging { z-index: 1000; }
        .dragging .p-cell { width: var(--cell); height: var(--cell); border-radius: 4px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9;
        }
        button { padding: 12px 40px; font-size: 20px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div id="game-board"></div>
    <div id="hand"><div class="slot" id="slot-0"></div><div class="slot" id="slot-1"></div><div class="slot" id="slot-2"></div></div>
    <div id="overlay"><h2>Game Over</h2><p id="final-score"></p><button onclick="location.reload()">RETRY</button></div>
<script>
    const BOARD_SIZE = 8, boardEl = document.getElementById('game-board'), scoreEl = document.getElementById('score');
    let board = Array(8).fill().map(()=>Array(8).fill(0)), score = 0, pieces = [null,null,null];
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d=0.06) {
        const o=audio.createOscillator(), g=audio.createGain();
        o.frequency.value=f; g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime+d);
        o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime+d);
    }
    const SHAPES = [
        {s:[[1,1],[1,1]], c:'#f87171'}, {s:[[1,1,1,1]], c:'#22d3ee'}, {s:[[1,1,1],[0,1,0]], c:'#fbbf24'},
        {s:[[1,1,0],[0,1,1]], c:'#4ade80'}, {s:[[1,1,1]], c:'#fb923c'}, {s:[[1]], c:'#f8fafc'}, {s:[[1,0],[1,1]], c:'#a78bfa'}
    ];
    function init() {
        boardEl.innerHTML = '';
        for(let i=0; i<64; i++) boardEl.appendChild(document.createElement('div')).className='cell';
        spawn();
    }
    function drawPiece(i) {
        const slot = document.getElementById(`slot-${i}`); slot.innerHTML = '';
        if(!pieces[i]) return;
        const p = document.createElement('div'); p.className = 'piece';
        p.style.gridTemplateColumns = `repeat(${pieces[i].s[0].length}, 20px)`;
        pieces[i].s.forEach(row => row.forEach(v => {
            const c = document.createElement('div'); c.className='p-cell';
            if(v) c.style.background = pieces[i].c;
            p.appendChild(c);
        }));
        p.onpointerdown = (e) => onGrab(e, i, p);
        slot.appendChild(p);
    }
    function spawn() {
        for(let i=0; i<3; i++) { pieces[i] = JSON.parse(JSON.stringify(SHAPES[Math.floor(Math.random()*SHAPES.length)])); drawPiece(i); }
        if(isGameOver()) showOver();
    }
    function onGrab(e, idx, el) {
        if(audio.state==='suspended') audio.resume();
        const s = pieces[idx].s, r = s.length, c = s[0].length;
        el.classList.add('dragging'); el.style.gridTemplateColumns = `repeat(${c}, var(--cell))`; el.style.gap = 'var(--gap)';
        const cS = boardEl.children[0].offsetWidth, gS = 3;
        const move = (ev) => {
            el.style.position = 'fixed';
            const tx = ev.clientX, ty = ev.clientY - (ev.pointerType==='touch'?120:50);
            el.style.left = (tx - (c*cS+(c-1)*gS)/2)+'px'; el.style.top = (ty - (r*cS+(r-1)*gS)/2)+'px';
            const p = getPos(tx, ty, r, c, cS, gS); clearP();
            if(p && can(s, p.r, p.c)) showP(s, p.r, p.c);
        };
        const up = (ev) => {
            const ty = ev.clientY - (ev.pointerType==='touch'?120:50), p = getPos(ev.clientX, ty, r, c, cS, gS);
            if(p && tryP(idx, p.r, p.c)) {
                document.getElementById(`slot-${idx}`).innerHTML = ''; pieces[idx] = null; beep(600); check();
                if(pieces.every(p=>p===null)) spawn(); else if(isGameOver()) showOver();
            } else { el.classList.remove('dragging'); el.style = ''; drawPiece(idx); }
            clearP(); window.onpointermove = window.onpointerup = null;
        };
        window.onpointermove = move; window.onpointerup = up; move(e);
    }
    function getPos(x, y, rs, cs, size, gap) {
        const b = boardEl.getBoundingClientRect(), st = size+gap;
        const r = Math.round((y-b.top-(rs*st/2))/st), c = Math.round((x-b.left-(cs*st/2))/st);
        return (r>=0 && r+rs<=8 && c>=0 && c+cs<=8) ? {r,c} : null;
    }
    function clearP() { document.querySelectorAll('.cell.preview').forEach(el=>el.classList.remove('preview')); }
    function showP(s, r, c) { s.forEach((row,dr)=>row.forEach((v,dc)=>{ if(v) boardEl.children[(r+dr)*8+(c+dc)].classList.add('preview'); })); }
    function can(s, r, c) { return s.every((row,dr)=>row.every((v,dc)=>!v || !board[r+dr][c+dc])); }
    function tryP(idx, r, c) {
        if(!can(pieces[idx].s, r, c)) return false;
        pieces[idx].s.forEach((row,dr)=>row.forEach((v,dc)=>{
            if(v) { board[r+dr][c+dc]=1; const el=boardEl.children[(r+dr)*8+c+dc]; el.className='cell filled'; el.style.background=pieces[idx].c; }
        }));
        return true;
    }
    function check() {
        let rs=[], cs=[];
        for(let i=0; i<8; i++) { if(board[i].every(v=>v===1)) rs.push(i); if(board.every(row=>row[i]===1)) cs.push(i); }
        if(rs.length || cs.length) {
            rs.forEach(r=>{ for(let i=0; i<8; i++) board[r][i]=0; }); cs.forEach(c=>{ for(let i=0; i<8; i++) board[i][c]=0; });
            score += (rs.length+cs.length)*10; scoreEl.innerText = score; beep(900, 0.1);
            setTimeout(() => board.forEach((row,r)=>row.forEach((v,c)=>{ const el=boardEl.children[r*8+c]; if(!v){el.className='cell';el.style.background='';} })), 100);
        }
    }
    function isGameOver() { return !pieces.some(p=>{ if(!p) return false; for(let r=0; r<=8-p.s.length; r++) for(let c=0; c<=8-p.s[0].length; c++) if(can(p.s,r,c)) return true; return false; }) && pieces.some(p=>p!==null); }
    function showOver() { document.getElementById('final-score').innerText = `SCORE: ${score}`; document.getElementById('overlay').style.display='flex'; }
    init();
</script>
</body>
</html>
